name: autosca

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - numpy>=1.26
  - scipy>=1.13
  - scipy-stubs

  - pandas>=2.2
  - scikit-learn>=1.5
  - matplotlib>=3.9
  - h5py>=3.11
  - openpyxl>=3.1

  - pip:
      - tensorflow>=2.16,<2.19
      - keras>=3.3,<3.6
      - keras-tuner>=1.4,<1.5
      - autokeras>=2.0,<2.1
      - protobuf>=4.25
      - future>=1.0
      - wandb

      - gdown>=5.2

      - google-api-python-client>=2.170
      - google-auth>=2.39
      - google-auth-oauthlib>=1.2
      - google-auth-httplib2>=0.2
      - ranky